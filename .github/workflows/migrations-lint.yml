name: migrations-lint

on:
  pull_request:
    paths:
      - "drizzle/**"
      - "scripts/lint-migrations.mjs"
      - ".github/workflows/migrations-lint.yml"
  push:
    branches: [main]
    paths:
      - "drizzle/**"
      - "scripts/lint-migrations.mjs"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/lint-migrations.mjs
